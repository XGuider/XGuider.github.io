---
layout: default
title: "页面未找到"
description: "你来到了没有知识的荒原 :("
permalink: /404.html
---

<style>
    body.error-404-page {
        background: url('{{ site.baseurl }}/img/404-bg.jpg') center/cover no-repeat fixed;
    }
    body.error-404-page .error-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
        background: rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(2px);
    }
    body.error-404-page .error-container {
        max-width: 820px;
        width: 100%;
        background: rgba(255, 255, 255, 0.92);
        border-radius: 16px;
        padding: 2rem 1.75rem;
        box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }
</style>

<div class="error-page">
    <div class="error-container">
        <h1 class="error-code">404</h1>
        <h2 class="error-title">页面未找到</h2>
        <p class="error-message">{{ page.description }}</p>

        <div class="error-actions">
            <a href="{{ site.baseurl }}/" class="btn btn-primary">
                <i class="fa-solid fa-house"></i> 返回首页
            </a>

            <button onclick="history.back()" class="btn">
                <i class="fa-solid fa-arrow-left"></i> 返回上一页
            </button>
        </div>

        <div class="search-suggestion">
            <p>或者试试搜索：</p>
            <form action="/" method="get" class="search-form">
                <div class="search-input-group">
                    <input
                        type="text"
                        name="q"
                        placeholder="搜索文章..."
                        class="search-input"
                        required
                        autofocus
                    >
                    <button type="submit" class="search-button">
                        <i class="fa-solid fa-search"></i>
                    </button>
                </div>
            </form>
        </div>

        <div class="popular-posts">
            <h3>热门文章</h3>
            <ul class="post-list">
                {% for post in site.posts limit:5 %}
                <li>
                    <a href="{{ post.url | relative_url }}" class="post-link">
                        {{ post.title }}
                        <small>{{ post.date | date: "%Y-%m-%d" }}</small>
                    </a>
                </li>
                {% endfor %}
            </ul>
        </div>

        <!-- Analytics event tracking -->
        <script defer>
            // Track 404 error
            if (typeof gtag === 'function') {
                gtag('event', '404_error', {
                    'event_category': 'error',
                    'event_label': window.location.href,
                    'custom_map': {'referrer': document.referrer}
                });
            }
        </script>
    </div>
</div>

<script>
  document.body.classList.add('page-fullscreen');
  document.body.classList.add('error-404-page');
</script>
